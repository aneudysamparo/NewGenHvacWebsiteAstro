server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----- Compression -----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # ----- Hashed build assets: cache forever (filenames change on rebuild) -----
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ----- Static media / fonts -----
    location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ----- App routes (Astro builds directory-style URLs: /about -> /about/index.html) -----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ----- Custom error pages (Astro emits these at the site root) -----
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
}
